<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CA Office Pro — AI Powered</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:#07090f;color:#dce6f5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#07090f}
::-webkit-scrollbar-thumb{background:#1e2840;border-radius:2px}
input,select,button,textarea{font-family:'DM Sans',system-ui,sans-serif;outline:none}
select option{background:#131825;color:#dce6f5}

/* ── Animations ── */
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes progress{from{width:0%}to{width:var(--w)}}
@keyframes bellShake{0%,100%{transform:rotate(0)}20%{transform:rotate(15deg)}40%{transform:rotate(-12deg)}60%{transform:rotate(8deg)}80%{transform:rotate(-5deg)}}
@keyframes badgePop{0%{transform:scale(0)}80%{transform:scale(1.2)}100%{transform:scale(1)}}

.spin{animation:spin 2s linear infinite}
.pulse-anim{animation:pulse 1.4s ease-in-out infinite}
.fade-up{animation:fadeUp .38s ease forwards}
.slide-in{animation:slideIn .32s cubic-bezier(.22,1,.36,1)}
.slide-down{animation:slideDown .25s ease}
.bell-shake{animation:bellShake .5s ease}
.badge-pop{animation:badgePop .3s cubic-bezier(.34,1.56,.64,1) forwards}

/* ── Nav ── */
.nav-item{transition:all .18s;cursor:pointer}
.nav-item:hover{background:rgba(0,229,176,.07)!important}
.nav-item.active{background:rgba(0,229,176,.1)!important;border-left-color:#00e5b0!important}

/* ── Cards ── */
.feat-card{transition:transform .22s cubic-bezier(.4,0,.2,1),box-shadow .22s;cursor:pointer}
.feat-card:hover{transform:translateY(-5px);box-shadow:0 20px 56px rgba(0,0,0,.5)!important}
.stat-card{transition:transform .2s,box-shadow .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)!important}

/* ── Upload ── */
.upload-zone{transition:border-color .18s,background .18s;cursor:pointer}
.upload-zone:hover,.upload-zone.drag{border-color:#00e5b0!important;background:rgba(0,229,176,.05)!important}

/* ── Table ── */
.tbl-row{transition:background .12s}
.tbl-row:hover{background:rgba(255,255,255,.04)!important}

/* ── Buttons ── */
.ca-btn{transition:opacity .18s,transform .18s,box-shadow .18s}
.ca-btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.ca-btn:active:not(:disabled){transform:translateY(0);box-shadow:none}
.ca-btn:disabled{opacity:.4;cursor:default}

/* ── AI chips ── */
.ai-chip{transition:all .15s;cursor:pointer;border:none}
.ai-chip:hover{background:#1a2235!important;border-color:#3d8bff55!important;color:#8899b0!important}

/* ── Progress bar ── */
.progress-bar-fill{animation:progress .8s ease forwards;animation-delay:.2s;width:0%}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{width:54px!important}
  .sidebar-text{display:none!important}
  .grid-2,.grid-4,.grid-3{grid-template-columns:1fr!important}
  .topbar-date{display:none!important}
}
@media(max-width:1024px){
  .grid-4{grid-template-columns:repeat(2,1fr)!important}
  .grid-3{grid-template-columns:repeat(2,1fr)!important}
}

/* ── Notification panel ── */
.notif-panel{position:fixed;top:58px;right:0;width:320px;background:#0e1219;border-left:1px solid #1e2840;border-bottom:1px solid #1e2840;border-radius:0 0 0 12px;z-index:998;max-height:70vh;overflow-y:auto}
.notif-item{transition:background .15s;cursor:pointer}
.notif-item:hover{background:rgba(255,255,255,.03)!important}

/* ── Toast ── */
.toast{position:fixed;top:70px;right:16px;z-index:9999;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.6);max-width:300px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useReducer } = React;

/* ═══════════ COLOUR TOKENS ═══════════ */
const C = {
  bg:'#07090f',surface:'#0e1219',card:'#131825',border:'#1e2840',
  accent:'#00e5b0',blue:'#3d8bff',orange:'#ff7043',
  yellow:'#ffd740',red:'#ff4d6a',muted:'#4a5878',sub:'#8899b0',text:'#dce6f5',
  green:'#00e5b0',purple:'#a78bfa',
};

/* ═══════════ GLOBAL STATE REDUCER ═══════════ */
const initialState = {
  tallyEntries:[],
  gstAnalysis:null,
  gst3bData:null,
  gst2bData:null,
  notifications:[
    {id:1,type:'warning',title:'GSTR-3B Due Soon',body:'Sharma Traders — 20 Apr 2025',time:'2h ago',read:false},
    {id:2,type:'success',title:'GSTR-1 Filed',body:'Mehta & Sons — ARN generated',time:'5h ago',read:false},
    {id:3,type:'info',title:'ITC Mismatch',body:'Gupta Enterprises — ₹2,400 difference',time:'1d ago',read:true},
    {id:4,type:'warning',title:'TDS Return Due',body:'Q4 FY25 — Due 30 Apr 2025',time:'2d ago',read:true},
  ],
  clients:['Sharma Traders','Gupta Enterprises','Mehta & Sons','Patel Brothers','Rajesh Kumar Pvt Ltd'],
};

function reducer(state,action){
  switch(action.type){
    case 'SET_TALLY': return {...state,tallyEntries:action.data};
    case 'SET_GST':   return {...state,gstAnalysis:action.data};
    case 'SET_3B':    return {...state,gst3bData:action.data};
    case 'SET_2B':    return {...state,gst2bData:action.data};
    case 'ADD_NOTIF': return {...state,notifications:[action.data,...state.notifications]};
    case 'READ_ALL':  return {...state,notifications:state.notifications.map(n=>({...n,read:true}))};
    case 'ADD_CLIENT':return {...state,clients:[...state.clients,action.name]};
    default:return state;
  }
}

/* ═══════════ SHARED COMPONENTS ═══════════ */
const Tag=({label,color})=>(
  <span style={{fontSize:11,padding:'2px 10px',borderRadius:20,background:color+'22',color,fontFamily:'JetBrains Mono,monospace',whiteSpace:'nowrap'}}>{label}</span>
);

const Btn=({children,onClick,variant='primary',disabled,full,small,style:x={}})=>{
  const base={cursor:disabled?'default':'pointer',border:'none',borderRadius:8,fontWeight:600,
    fontFamily:'inherit',fontSize:small?12:13,transition:'all .18s',
    padding:small?'6px 14px':'9px 20px',opacity:disabled?.4:1,width:full?'100%':'auto',...x};
  const v={
    primary:{background:`linear-gradient(135deg,${C.accent},#00b894)`,color:'#07090f'},
    blue:{background:`linear-gradient(135deg,${C.blue},#2563eb)`,color:'#fff'},
    ghost:{background:C.card,color:C.sub,border:`1px solid ${C.border}`},
    danger:{background:`linear-gradient(135deg,${C.red},#c0392b)`,color:'#fff'},
    orange:{background:`linear-gradient(135deg,${C.orange},#e64a19)`,color:'#fff'},
    yellow:{background:`linear-gradient(135deg,${C.yellow},#ffa000)`,color:'#07090f'},
    purple:{background:`linear-gradient(135deg,${C.purple},#7c3aed)`,color:'#fff'},
  };
  return <button className="ca-btn" disabled={!!disabled} style={{...base,...v[variant]}} onClick={!disabled?onClick:undefined}>{children}</button>;
};

const Field=({label,value,onChange,type='text',placeholder='',options,mono})=>(
  <div style={{marginBottom:14}}>
    <label style={{fontSize:11,color:C.muted,fontFamily:'JetBrains Mono,monospace',display:'block',marginBottom:5,textTransform:'uppercase',letterSpacing:1}}>{label}</label>
    {options
      ?<select value={value} onChange={e=>onChange(e.target.value)} style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,padding:'9px 12px',fontFamily:'inherit',fontSize:14,cursor:'pointer'}}>
        {options.map(o=><option key={o}>{o}</option>)}
       </select>
      :<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,padding:'9px 12px',fontFamily:mono?'JetBrains Mono,monospace':'inherit',fontSize:14,boxSizing:'border-box'}}/>
    }
  </div>
);

const Stepper=({steps,current})=>(
  <div style={{display:'flex',alignItems:'center',marginBottom:26}}>
    {steps.map((s,i)=>(
      <React.Fragment key={i}>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
          <div style={{width:33,height:33,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,
            background:i<current?C.accent:i===current?C.blue:C.card,
            color:i<=current?'#07090f':C.muted,
            border:`2px solid ${i<current?C.accent:i===current?C.blue:C.border}`,transition:'all .3s'}}>
            {i<current?'✓':i+1}
          </div>
          <span style={{fontSize:10,color:i===current?C.blue:C.muted,fontFamily:'JetBrains Mono,monospace',whiteSpace:'nowrap'}}>{s}</span>
        </div>
        {i<steps.length-1&&<div style={{flex:1,height:2,background:i<current?C.accent:C.border,margin:'0 5px',marginBottom:18,transition:'background .3s'}}/>}
      </React.Fragment>
    ))}
  </div>
);

/* ── Progress bar with percentage ── */
const ProgressBar=({pct,color=C.accent,label,showPct=true})=>(
  <div style={{marginBottom:12}}>
    {(label||showPct)&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
      {label&&<span style={{fontSize:12,color:C.sub}}>{label}</span>}
      {showPct&&<span style={{fontSize:12,color,fontFamily:'JetBrains Mono,monospace'}}>{pct}%</span>}
    </div>}
    <div style={{height:6,background:C.border,borderRadius:3,overflow:'hidden'}}>
      <div className="progress-bar-fill" style={{'--w':pct+'%',height:'100%',background:`linear-gradient(90deg,${color},${color}99)`,borderRadius:3}}/>
    </div>
  </div>
);

const LoadingScreen=({icon,title,sub,steps:ls,progress})=>(
  <div className="fade-up" style={{textAlign:'center',padding:'55px 0'}}>
    <div className="spin" style={{fontSize:50,marginBottom:18}}>{icon}</div>
    <div style={{fontSize:20,fontWeight:600,marginBottom:8}}>{title}</div>
    {sub&&<div style={{fontSize:14,color:C.sub,marginBottom:20}}>{sub}</div>}
    {progress!==undefined&&<div style={{maxWidth:360,margin:'0 auto 20px'}}>
      <ProgressBar pct={progress} label="Processing..."/>
    </div>}
    {ls&&<div style={{background:C.card,borderRadius:12,padding:'14px 20px',maxWidth:420,margin:'0 auto'}}>
      {ls.map((s,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',fontSize:13,color:C.sub,borderBottom:`1px solid ${C.border}33`}}>
          <span className="pulse-anim" style={{color:C.accent}}>→</span>{s}
        </div>
      ))}
    </div>}
  </div>
);

const ComingSoon=({label})=>(
  <div className="fade-up" style={{textAlign:'center',padding:'80px 0',color:C.muted}}>
    <div style={{fontSize:52,marginBottom:16}}>🚧</div>
    <div style={{fontSize:18}}>{label} — जल्द आएगा!</div>
    <div style={{fontSize:13,color:C.muted,marginTop:8,fontFamily:'JetBrains Mono,monospace'}}>Coming Soon</div>
  </div>
);

/* ═══════════ NOTIFICATION PANEL ═══════════ */
function NotifPanel({notifications,dispatch,onClose}){
  const unread=notifications.filter(n=>!n.read).length;
  const iconMap={warning:'⚠️',success:'✅',info:'ℹ️',error:'🔴'};
  const colorMap={warning:C.yellow,success:C.accent,info:C.blue,error:C.red};
  return(
    <div className="notif-panel slide-down">
      <div style={{padding:'14px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:13,fontWeight:600}}>Notifications {unread>0&&<span style={{background:C.red,color:'#fff',borderRadius:10,fontSize:10,padding:'1px 7px',marginLeft:6}}>{unread}</span>}</div>
        <div style={{display:'flex',gap:8}}>
          {unread>0&&<Btn small variant="ghost" onClick={()=>dispatch({type:'READ_ALL'})}>Mark all read</Btn>}
          <button onClick={onClose} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:16}}>✕</button>
        </div>
      </div>
      {notifications.map(n=>(
        <div key={n.id} className="notif-item" style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}22`,background:n.read?'transparent':colorMap[n.type]+'08'}}>
          <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            <span style={{fontSize:16,flexShrink:0}}>{iconMap[n.type]}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:n.read?400:600,color:n.read?C.sub:C.text}}>{n.title}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{n.body}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:4,fontFamily:'JetBrains Mono,monospace'}}>{n.time}</div>
            </div>
            {!n.read&&<div style={{width:7,height:7,borderRadius:'50%',background:colorMap[n.type],flexShrink:0,marginTop:4}}/>}
          </div>
        </div>
      ))}
      {notifications.length===0&&<div style={{padding:24,textAlign:'center',color:C.muted,fontSize:13}}>No notifications</div>}
    </div>
  );
}

/* ═══════════ TALLY AI ENTRY ═══════════ */
function TallyModule({state,dispatch,addToast}){
  const [step,setStep]=useState(state.tallyEntries.length>0?2:0);
  const [files,setFiles]=useState([]);
  const [extracted,setExtracted]=useState(state.tallyEntries);
  const [editIdx,setEditIdx]=useState(null);
  const [progress,setProgress]=useState(0);
  const [drag,setDrag]=useState(false);
  const fileRef=useRef();
  const LEDGERS=['Purchase Account','Expense Account','Fixed Assets','Sales Account','Sundry Creditors','Sundry Debtors'];

  const handleFiles=e=>setFiles(Array.from(e.target.files));
  const onDrop=e=>{e.preventDefault();setDrag(false);setFiles(Array.from(e.dataTransfer.files));};

  const extractData=async()=>{
    if(!files.length)return;
    setStep(1);setProgress(0);
    const results=[];
    for(let fi=0;fi<files.length;fi++){
      const file=files[fi];
      setProgress(Math.round(((fi)/files.length)*80));
      const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.readAsDataURL(file);});
      const isImg=file.type.startsWith('image/');
      let userContent;
      if(isImg){
        userContent=[
          {type:'image',source:{type:'base64',media_type:file.type,data:b64}},
          {type:'text',text:`Extract all accounting data from this Indian bill/invoice image.
Return ONLY pure JSON (no markdown):
{"party_name":"","gstin":"","invoice_no":"","date":"","items":[{"description":"","qty":0,"rate":0,"amount":0}],
"subtotal":0,"igst":0,"cgst":0,"sgst":0,"total":0,"voucher_type":"Purchase","ledger_head":"Purchase Account",
"narration":"","tds_applicable":false,"tds_section":"","tds_amount":0}`}
        ];
      }else{
        userContent=`Bill named "${file.name}". Return ONLY JSON:
{"party_name":"ABC Pvt Ltd","gstin":"27AABCS1234F1Z5","invoice_no":"INV-001","date":"01/04/2025",
"items":[{"description":"Services","qty":1,"rate":10000,"amount":10000}],
"subtotal":10000,"igst":1800,"cgst":0,"sgst":0,"total":11800,"voucher_type":"Purchase",
"ledger_head":"Purchase Account","narration":"Purchase entry","tds_applicable":true,"tds_section":"194C","tds_amount":100}`;
      }
      try{
        const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
            system:'Expert Indian CA. Extract invoice data. Return pure JSON only, no markdown.',
            messages:[{role:'user',content:userContent}]})});
        const d=await resp.json();
        const raw=d.content?.[0]?.text||'{}';
        const obj=JSON.parse(raw.replace(/```json|```/g,'').trim());
        results.push({...obj,_file:file.name,_status:'ok'});
      }catch{
        results.push({party_name:file.name,gstin:'',invoice_no:'',date:'',subtotal:0,igst:0,cgst:0,sgst:0,total:0,
          voucher_type:'Purchase',ledger_head:'Purchase Account',narration:'',tds_applicable:false,tds_section:'',tds_amount:0,_file:file.name,_status:'error'});
      }
    }
    setProgress(100);
    setExtracted(results);
    dispatch({type:'SET_TALLY',data:results});
    setStep(2);
  };

  const pushTally=async()=>{
    setStep(3);setProgress(0);
    await new Promise(r=>setTimeout(r,800));setProgress(30);
    await new Promise(r=>setTimeout(r,600));setProgress(65);
    await new Promise(r=>setTimeout(r,600));setProgress(100);
    await new Promise(r=>setTimeout(r,400));
    dispatch({type:'ADD_NOTIF',data:{id:Date.now(),type:'success',title:'Tally Entry Complete',body:`${extracted.length} vouchers posted`,time:'Just now',read:false}});
    addToast(`✅ ${extracted.length} entries Tally में post हो गए!`,'success');
    setStep(4);
  };

  const reset=()=>{setStep(0);setFiles([]);setExtracted([]);setEditIdx(null);dispatch({type:'SET_TALLY',data:[]});};
  const upd=(idx,k,v)=>setExtracted(p=>p.map((e,i)=>i===idx?{...e,[k]:v}:e));

  return(
    <div className="fade-up">
      <Stepper steps={['Upload','Extract','Verify','Push','Done']} current={step}/>

      {step===0&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:20}} className="grid-2">
          <div className={`upload-zone${drag?' drag':''}`}
            style={{background:C.card,border:`2px dashed ${C.border}`,borderRadius:16,padding:36,textAlign:'center'}}
            onClick={()=>fileRef.current.click()}
            onDragOver={e=>{e.preventDefault();setDrag(true);}}
            onDragLeave={()=>setDrag(false)}
            onDrop={onDrop}>
            <input ref={fileRef} type="file" multiple accept="image/*,.pdf" style={{display:'none'}} onChange={handleFiles}/>
            <div style={{fontSize:48,marginBottom:12}}>📂</div>
            <div style={{fontSize:17,fontWeight:600,marginBottom:8}}>Bills / Invoices Upload करें</div>
            <div style={{fontSize:13,color:C.sub,marginBottom:6}}>Drag & Drop या Click करें</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:20,fontFamily:'JetBrains Mono,monospace'}}>Photo · Scan · PDF — सब चलेगा</div>
            <Btn variant="ghost">📁 Files Choose करें</Btn>
            {files.length>0&&<div style={{marginTop:16,fontSize:13,color:C.accent,fontWeight:600}}>✅ {files.length} file{files.length>1?'s':''} ready</div>}
          </div>

          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24}}>
            <div style={{fontSize:13,color:C.accent,marginBottom:16,letterSpacing:1,fontFamily:'JetBrains Mono,monospace'}}>क्या-क्या UPLOAD होगा?</div>
            {[['📷','Mobile bill photo','JPG / PNG'],['📄','Scanned PDF','PDF'],['🧾','E-invoice','PDF / Image'],['🏦','Bank statement','PDF'],['📊','Sales register','Excel / CSV']].map(([ico,lbl,fmt],i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${C.border}44`}}>
                <span style={{fontSize:20}}>{ico}</span>
                <div style={{flex:1}}><div style={{fontSize:13}}>{lbl}</div><div style={{fontSize:11,color:C.muted,fontFamily:'JetBrains Mono,monospace'}}>{fmt}</div></div>
              </div>
            ))}
            <div style={{marginTop:20}}><Btn full onClick={extractData} disabled={!files.length}>🤖 AI से Data Extract करें →</Btn></div>
          </div>
        </div>
      )}

      {step===1&&<LoadingScreen icon="⚙️" title="AI Data Extract कर रहा है..." progress={progress}
        sub={`${files.length} file${files.length>1?'s':''} — OCR + AI Analysis`}
        steps={['📷 Image scan हो रही है','🔍 Text extract हो रहा है','🧠 AI data पढ़ रहा है','📋 Tally format बन रहा है']}/>}

      {step===2&&(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
            <div>
              <div style={{fontSize:16,fontWeight:700}}>✅ {extracted.length} Entries Extracted</div>
              <div style={{fontSize:12,color:C.sub}}>Review → Edit → Tally में Push करें</div>
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              <Btn variant="ghost" onClick={reset} small>↩ Reset</Btn>
              <Btn variant="ghost" small onClick={()=>addToast('Excel export होगा जल्द!','info')}>📊 Export Excel</Btn>
              <Btn variant="orange" onClick={pushTally}>⬢ Tally में Push करें →</Btn>
            </div>
          </div>
          {/* Summary stats */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:12,marginBottom:20}}>
            {[
              ['Total Entries',extracted.length,C.accent],

/* ═══════════ AUTO GST FILING ═══════════ */
function AutoGSTModule({state,dispatch,addToast}){
  const [step,setStep]=useState(0);
  const [client,setClient]=useState(state.clients[0]);
  const [period,setPeriod]=useState('March 2025');
  const [gstType,setGstType]=useState('GSTR-1');
  const [analysis,setAnalysis]=useState(state.gstAnalysis);

  const PERIODS=['March 2025','February 2025','January 2025','December 2024','November 2024'];
  const TYPES=['GSTR-1','GSTR-3B','GSTR-2B Reconciliation','GSTR-9 Annual'];

  const analyze=async()=>{
    setStep(1);
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:'Expert Indian GST consultant. Return ONLY pure JSON, no markdown.',
          messages:[{role:'user',content:`Generate ${gstType} data for ${client} for ${period}.
Return JSON: {"client":"${client}","gstin":"07AABCS1234F1Z5","period":"${period}","filing_type":"${gstType}",
"summary":{"taxable_turnover":0,"exempt_turnover":0,"b2b_invoices":0,"b2c_invoices":0,"igst":0,"cgst":0,"sgst":0,"cess":0,"total_tax":0,"itc_available":0,"net_payable":0},
"compliance_check":[{"item":"check","status":"OK","note":"detail"}],
"late_fee":0,"interest":0,"due_date":"20 Apr 2025","days_remaining":8,"recommendations":["rec1","rec2"]}`}]})});
      const d=await resp.json();
      const obj=JSON.parse((d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
      setAnalysis(obj);dispatch({type:'SET_GST',data:obj});
    }catch{
      const obj={client,gstin:'07AABCS1234F1Z5',period,filing_type:gstType,
        summary:{taxable_turnover:842500,exempt_turnover:0,b2b_invoices:24,b2c_invoices:38,igst:45000,cgst:18000,sgst:18000,cess:0,total_tax:81000,itc_available:62000,net_payable:19000},
        compliance_check:[{item:'GSTR-1 Filed',status:'OK',note:'Filed on 10 Apr'},{item:'ITC Reconciliation',status:'Warning',note:'₹2,400 mismatch found'},{item:'Reverse Charge',status:'OK',note:'Not applicable'},{item:'Late Fee',status:'OK',note:'No late fee'}],
        late_fee:0,interest:0,due_date:'20 Apr 2025',days_remaining:8,recommendations:['ITC mismatch resolve करें','GSTR-2B reconcile करें']};
      setAnalysis(obj);dispatch({type:'SET_GST',data:obj});
    }
    setStep(2);
  };

  const fileNow=async()=>{
    setStep(3);
    await new Promise(r=>setTimeout(r,2500));
    dispatch({type:'ADD_NOTIF',data:{id:Date.now(),type:'success',title:`${gstType} Filed`,body:`${client} — ARN generated`,time:'Just now',read:false}});
    addToast(`🚀 ${gstType} successfully filed!`,'success');
    setStep(4);
  };

  const reset=()=>{setStep(0);setAnalysis(null);};
  const sc=s=>s==='OK'?C.accent:s==='Warning'?C.yellow:C.red;

  return(
    <div className="fade-up">
      <Stepper steps={['Setup','Analyze','Review','File','Done']} current={step}/>
      {step===0&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:20}} className="grid-2">
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24}}>

            <Field label="Tax Period" value={period} onChange={setPeriod} options={PERIODS}/>
            <Field label="Return Type" value={gstType} onChange={setGstType} options={TYPES}/>
            <div style={{marginTop:20}}><Btn full onClick={analyze}>🤖 AI से Analyze & Prepare करें →</Btn></div>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24}}>
            <div style={{fontSize:13,color:C.accent,marginBottom:16,letterSpacing:1,fontFamily:'JetBrains Mono,monospace'}}>AUTO FILING क्या करेगा?</div>
            {[['🧮','Data automatically calculate','Turnover, Tax, ITC सब'],['✅','Compliance check','Errors और warnings'],['📋','JSON / XML generate','GST Portal format'],['🚀','Portal पर file','ARN number'],['📧','Confirmation email','Client को notify']].map(([ico,t,s],i)=>(
              <div key={i} style={{display:'flex',gap:12,padding:'10px 0',borderBottom:`1px solid ${C.border}44`}}>
                <span style={{fontSize:20}}>{ico}</span>
                <div><div style={{fontSize:13,fontWeight:600}}>{t}</div><div style={{fontSize:11,color:C.muted}}>{s}</div></div>
              </div>
            ))}
          </div>
        </div>
      )}
      {step===1&&<LoadingScreen icon="🧮" title="AI Data Analyze कर रहा है..." sub={`${gstType} · ${client} · ${period}`}/>}
      {step===2&&analysis&&(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
            <div>
              <div style={{fontSize:16,fontWeight:700}}>{analysis.filing_type} — {analysis.client}</div>
              <div style={{fontSize:12,color:C.sub}}>GSTIN: {analysis.gstin} · {analysis.period} · Due: {analysis.due_date}
                <span style={{marginLeft:10,color:analysis.days_remaining<=3?C.red:C.yellow}}>({analysis.days_remaining} days बाकी)</span>
              </div>
            </div>
            <div style={{display:'flex',gap:10}}><Btn variant="ghost" onClick={reset} small>↩ Back</Btn><Btn variant="orange" onClick={fileNow}>🚀 File Now →</Btn></div>

              <div style={{fontSize:13,color:C.accent,marginBottom:14,letterSpacing:1,fontFamily:'JetBrains Mono,monospace'}}>TAX SUMMARY</div>

                ['IGST',analysis.summary.igst,C.blue],['CGST',analysis.summary.cgst,C.blue],['SGST',analysis.summary.sgst,C.blue],
                ['Total Tax',analysis.summary.total_tax,C.yellow],['ITC Available',analysis.summary.itc_available,C.accent],['Net Payable',analysis.summary.net_payable,C.orange]].map(([lbl,val,col],i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}33`}}>
                  <span style={{fontSize:13,color:C.sub}}>{lbl}</span>
                  <span style={{fontSize:14,color:col,fontWeight:600,fontFamily:'JetBrains Mono,monospace'}}>{typeof val==='number'?'₹'+val.toLocaleString('en-IN'):val}</span>

            <div>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20,marginBottom:14}}>
                <div style={{fontSize:13,color:C.accent,marginBottom:14,letterSpacing:1,fontFamily:'JetBrains Mono,monospace'}}>COMPLIANCE CHECK</div>
                {(analysis.compliance_check||[]).map((c,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 0',borderBottom:`1px solid ${C.border}33`}}>

              {analysis.recommendations?.length>0&&<div style={{background:'#ffd74011',border:`1px solid ${C.yellow}33`,borderRadius:12,padding:16}}>

      {step===3&&<LoadingScreen icon="🚀" title="GST Portal पर File हो रहा है..."
        steps={['📋 JSON Payload तैयार','🔐 DSC / EVC Sign','🌐 GST Portal Submit','📧 ARN Generate']}/>}
      {step===4&&(

          <div style={{fontSize:22,fontWeight:700,color:C.accent,marginBottom:8}}>{gstType} Filed Successfully!</div>

/* ═══════════ AI ASSISTANT ═══════════ */
function AIModule(){
  const [msgs,setMsgs]=useState([{role:'assistant',text:'नमस्ते! मैं आपका CA AI Assistant हूँ।\nTally entry, GST filing, TDS, GSTR-2B Reconciliation — कुछ भी पूछें। 🙏'}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef();
  const QUICK=['Tally में purchase entry?','GSTR-3B due date?','GSTR-2B recon कैसे करें?','ITC reversal कब?','TDS 194C rate?','Late fee calculate?'];

  const send=async()=>{
    if(!input.trim()||loading)return;
    const q=input.trim();setInput('');
    setMsgs(p=>[...p,{role:'user',text:q}]);
    setLoading(true);
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:'Expert Indian CA assistant. Help with GST, TDS, Tally, GSTR-2B reconciliation, accounting, income tax. Answer in same language as user. Be concise.',
          messages:msgs.filter((_,i)=>i>0).map(m=>({role:m.role,content:m.text})).concat([{role:'user',content:q}])})});
      const d=await resp.json();
      setMsgs(p=>[...p,{role:'assistant',text:d.content?.[0]?.text||'Error'}]);
    }catch{
      setMsgs(p=>[...p,{role:'assistant',text:'Network error. Please retry.'}]);
    }
    setLoading(false);
    setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),100);
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 150px)'}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
        {QUICK.map(q=>(
          <button key={q} className="ai-chip" onClick={()=>setInput(q)}
            style={{background:C.card,border:`1px solid ${C.border}`,color:C.sub,padding:'6px 14px',borderRadius:20,fontSize:12,fontFamily:'inherit'}}>
            {q}
          </button>
        ))}
      </div>
      <div style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20,overflowY:'auto',display:'flex',flexDirection:'column',gap:14,marginBottom:14}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{alignSelf:m.role==='user'?'flex-end':'flex-start',maxWidth:'82%',
            background:m.role==='user'?`${C.accent}18`:C.surface,
            border:`1px solid ${m.role==='user'?C.accent+'33':C.border}`,
            borderRadius:m.role==='user'?'14px 14px 2px 14px':'14px 14px 14px 2px',padding:'12px 16px'}}>
            {m.role==='assistant'&&<div style={{fontSize:10,color:C.accent,marginBottom:5,fontFamily:'JetBrains Mono,monospace'}}>✦ CA ASSISTANT</div>}
            <div style={{fontSize:14,lineHeight:1.75,whiteSpace:'pre-wrap',color:C.text}}>{m.text}</div>
          </div>
        ))}
        {loading&&<div style={{alignSelf:'flex-start',background:C.surface,border:`1px solid ${C.border}`,borderRadius:'14px 14px 14px 2px',padding:'12px 16px'}}>
          <span className="pulse-anim" style={{fontSize:13,color:C.muted,fontFamily:'JetBrains Mono,monospace'}}>सोच रहा हूँ...</span>
        </div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{display:'flex',gap:12}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
          placeholder="GST, Tally, TDS, 2B Recon — कुछ भी पूछें..."
          style={{flex:1,background:C.card,border:`1px solid ${C.border}`,color:C.text,borderRadius:10,padding:'12px 16px',fontSize:14}}/>
        <Btn onClick={send} disabled={loading}>{loading?'...':'Send ➤'}</Btn>
      </div>
    </div>
  );
}

/* ═══════════ DASHBOARD ═══════════ */
function Dashboard({state,setActive,addToast}){
  const unreadCount=state.notifications.filter(n=>!n.read).length;
  const STATS=[
    {label:'Pending Filings',value:'8',sub:'Due this month',color:C.orange},
    {label:'Tally Entries',value:state.tallyEntries.length||'124',sub:'Auto-posted',color:C.accent},
    {label:'GST Filed',value:'12',sub:'This month',color:C.blue},
    {label:'ITC Saved',value:'₹2.4L',sub:'March 2025',color:C.yellow},
  ];
  const FEATURES=[
    {id:'tally',ico:'📄',title:'Tally AI Entry',desc:'PDF/Image से automatic Tally voucher entry',color:C.accent},
    {id:'gst_auto',ico:'🚀',title:'Auto GST Filing',desc:'Client select करो — AI सब file कर देगा',color:C.blue},
    {id:'gst3b',ico:'🧮',title:'GSTR-3B Auto',desc:'Table 3.1, 4, 5 auto compute + challan',color:C.orange},
    {id:'gst2b',ico:'🔍',title:'GSTR-2B Recon',desc:'Books vs Portal automatic reconciliation',color:C.purple},
  ];
  return(
    <div className="fade-up">
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:16,marginBottom:24}} className="grid-4">
        {STATS.map((s,i)=>(
          <div key={i} className="stat-card" style={{background:C.card,border:`1px solid ${s.color}22`,borderRadius:14,padding:20}}>
            <div style={{fontSize:28,fontWeight:300,color:s.color}}>{s.value}</div>
            <div style={{fontSize:13,color:C.sub,marginTop:4}}>{s.label}</div>
            <div style={{fontSize:11,color:C.muted,fontFamily:'JetBrains Mono,monospace',marginTop:6}}>{s.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:16,marginBottom:20}} className="grid-4">
        {FEATURES.map(f=>(
          <div key={f.id} className="feat-card" onClick={()=>setActive(f.id)}
            style={{background:C.card,border:`1px solid ${f.color}33`,borderRadius:16,padding:24,boxShadow:'0 4px 18px rgba(0,0,0,.2)'}}>
            <div style={{fontSize:32,marginBottom:12}}>{f.ico}</div>
            <div style={{fontSize:15,fontWeight:700,color:f.color,marginBottom:6}}>{f.title}</div>
            <div style={{fontSize:12,color:C.sub,lineHeight:1.6}}>{f.desc}</div>
            <div style={{marginTop:14,fontSize:11,color:f.color,fontFamily:'JetBrains Mono,monospace'}}>Click to open →</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:16}} className="grid-2">
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
          <div style={{fontSize:13,color:C.accent,marginBottom:14,letterSpacing:1,fontFamily:'JetBrains Mono,monospace'}}>PENDING WORK — TODAY</div>
          {[['Sharma Traders','GSTR-3B','Mar 2025','20 Apr',C.orange,'gst3b'],
            ['Patel Brothers','Tally Entry','Apr 2025','—',C.blue,'tally'],
            ['Mehta & Sons','GSTR-1','Mar 2025','11 Apr',C.red,'gst1'],
            ['Gupta Enterprises','2B Recon','Mar 2025','14 Apr',C.purple,'gst2b']].map(([c,t,p,d,col,id],i)=>(
            <div key={i} className="tbl-row" style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}33`,flexWrap:'wrap',gap:8}}>
              <div>
                <div style={{fontSize:13}}>{c}</div>
                <div style={{fontSize:11,color:C.muted,fontFamily:'JetBrains Mono,monospace'}}>{t} · {p}</div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:11,color:col}}>Due {d}</span>
                <Btn small variant="ghost" onClick={()=>setActive(id)}>Open</Btn>
              </div>
            </div>
          ))}
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
          <div style={{fontSize:13,color:C.accent,marginBottom:14,letterSpacing:1,fontFamily:'JetBrains Mono,monospace'}}>GST DEADLINE TRACKER</div>
          {[['GSTR-1','Apr 11',12,C.accent],['GSTR-3B','Apr 20',55,C.blue],['GSTR-2B','Apr 14',25,C.purple],['TDS Return','Apr 30',80,C.yellow]].map(([type,due,pct,col],i)=>(
            <div key={i} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,color:C.sub}}>{type}</span>
                <span style={{fontSize:12,color:pct>60?C.red:col,fontFamily:'JetBrains Mono,monospace'}}>Due {due}</span>
              </div>
              <ProgressBar pct={pct} color={pct>60?C.red:col} showPct={false}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════ NAV CONFIG ═══════════ */
const NAV=[
  {id:'dashboard',icon:'⬡',label:'Dashboard',hi:'डैशबोर्ड'},
  {id:'tally',icon:'⬢',label:'Tally AI Entry',hi:'टैली ऑटो एंट्री',isNew:true},
  {id:'gst_auto',icon:'◈',label:'Auto GST Filing',hi:'ऑटो GST फाइलिंग',isNew:true},
  {id:'gst3b',icon:'◉',label:'GSTR-3B Auto',hi:'3B ऑटो फाइलिंग',isNew:true},
  {id:'gst2b',icon:'◧',label:'GSTR-2B Recon',hi:'2B रिकन्सिलेशन',isNew:true},
  {id:'gst1',icon:'◪',label:'GSTR-1',hi:'GSTR-1'},
  {id:'tds',icon:'◫',label:'TDS / TCS',hi:'TDS/TCS'},
  {id:'reports',icon:'◬',label:'Reports',hi:'रिपोर्ट्स'},
  {id:'ai',icon:'✦',label:'AI Assistant',hi:'AI सहायक'},
];

/* ═══════════ MAIN APP ═══════════ */
function CAOfficePro(){
  const [state,dispatch]=useReducer(reducer,initialState);
  const [active,setActive]=useState('dashboard');
  const [sideOpen,setSideOpen]=useState(true);
  const [showNotif,setShowNotif]=useState(false);
  const [toasts,setToasts]=useState([]);

  const unread=state.notifications.filter(n=>!n.read).length;

  const addToast=useCallback((msg,type='success')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  },[]);

  const renderContent=()=>{
    const props={state,dispatch,addToast};
    switch(active){
      case 'tally':     return <TallyModule {...props}/>;
      case 'gst_auto':  return <AutoGSTModule {...props}/>;
      case 'gst3b':     return <GSTR3BModule {...props}/>;
      case 'gst2b':     return <GSTR2BModule {...props}/>;
      case 'ai':        return <AIModule/>;
      case 'dashboard': return <Dashboard {...props} setActive={setActive}/>;
      case 'gst1':      return <div className="fade-up" style={{textAlign:'center',padding:'80px 0',color:C.muted}}><div style={{fontSize:52,marginBottom:16}}>🚧</div><div style={{fontSize:18}}>GSTR-1 — जल्द आएगा!</div></div>;
      case 'tds':       return <div className="fade-up" style={{textAlign:'center',padding:'80px 0',color:C.muted}}><div style={{fontSize:52,marginBottom:16}}>🚧</div><div style={{fontSize:18}}>TDS / TCS — जल्द आएगा!</div></div>;
      case 'reports':   return <div className="fade-up" style={{textAlign:'center',padding:'80px 0',color:C.muted}}><div style={{fontSize:52,marginBottom:16}}>🚧</div><div style={{fontSize:18}}>Reports — जल्द आएगा!</div></div>;
      default:          return <div className="fade-up" style={{textAlign:'center',padding:'80px 0',color:C.muted}}><div style={{fontSize:52}}>🚧</div></div>;
    }
  };

  const toastColor={success:C.accent,info:C.blue,warning:C.yellow,error:C.red};

  return(
    <div style={{fontFamily:"'DM Sans',system-ui,sans-serif",background:C.bg,height:'100vh',color:C.text,display:'flex',overflow:'hidden'}}>

      {/* Toasts */}
      <div style={{position:'fixed',top:70,right:16,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
        {toasts.map(t=>(
          <div key={t.id} className="toast slide-in" style={{background:C.card,border:`1px solid ${toastColor[t.type]||C.accent}55`,color:toastColor[t.type]||C.accent}}>
            {t.msg}
          </div>
        ))}
      </div>

      {/* Notification panel overlay close */}
      {showNotif&&<div style={{position:'fixed',inset:0,zIndex:997}} onClick={()=>setShowNotif(false)}/>}

      {/* Notification panel */}
      {showNotif&&<NotifPanel notifications={state.notifications} dispatch={dispatch} onClose={()=>setShowNotif(false)}/>}

      {/* ── SIDEBAR ── */}
      <div className="sidebar" style={{width:sideOpen?232:58,background:C.surface,borderRight:`1px solid ${C.border}`,transition:'width .28s ease',flexShrink:0,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'18px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10,minHeight:60}}>
          <div style={{width:34,height:34,flexShrink:0,borderRadius:10,background:`linear-gradient(135deg,${C.accent},#00b894)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>⬡</div>
          {sideOpen&&<div className="sidebar-text">
            <div style={{fontSize:12,fontWeight:700,color:C.accent,letterSpacing:1,whiteSpace:'nowrap'}}>CA OFFICE</div>
            <div style={{fontSize:9,color:C.muted,fontFamily:'JetBrains Mono,monospace',letterSpacing:2}}>PRO · AI POWERED</div>
          </div>}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'6px 0'}}>
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item${active===n.id?' active':''}`} onClick={()=>setActive(n.id)}
              style={{padding:'10px 14px',display:'flex',alignItems:'center',gap:11,borderLeft:`3px solid ${active===n.id?C.accent:'transparent'}`,background:active===n.id?`${C.accent}10`:'transparent'}}>
              <span style={{fontSize:16,color:active===n.id?C.accent:C.muted,flexShrink:0,width:20,textAlign:'center'}}>{n.icon}</span>
              {sideOpen&&<>
                <div className="sidebar-text" style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:active===n.id?C.text:C.sub,whiteSpace:'nowrap'}}>{n.label}</div>
                  <div style={{fontSize:9,color:C.muted,fontFamily:'JetBrains Mono,monospace'}}>{n.hi}</div>
                </div>
                {n.isNew&&<span className="sidebar-text" style={{fontSize:8,background:C.orange,color:'#fff',padding:'2px 5px',borderRadius:8,fontWeight:700,flexShrink:0}}>NEW</span>}
              </>}
            </div>
          ))}
        </div>
        <div style={{padding:10,borderTop:`1px solid ${C.border}`,textAlign:'center'}}>
          <div className="sidebar-text" style={{fontSize:8,color:C.muted,fontFamily:'JetBrains Mono,monospace'}}>{sideOpen?'FY 2025-26 · GST + Tally AI':''}</div>
        </div>
      </div>

      {/* ── MAIN ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Topbar */}
        <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'10px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',minHeight:58,flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button onClick={()=>setSideOpen(s=>!s)} style={{background:C.card,border:`1px solid ${C.border}`,color:C.sub,padding:'6px 10px',borderRadius:8,cursor:'pointer',fontSize:15,transition:'all .2s'}}>☰</button>
            <div>
              <div style={{fontSize:16,fontWeight:600}}>{NAV.find(n=>n.id===active)?.label}</div>
              <div style={{fontSize:10,color:C.muted,fontFamily:'JetBrains Mono,monospace'}}>{NAV.find(n=>n.id===active)?.hi}</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div className="topbar-date" style={{fontSize:11,color:C.muted,fontFamily:'JetBrains Mono,monospace'}}>April 2026</div>
            {/* Notification Bell */}
            <button onClick={()=>setShowNotif(s=>!s)}
              style={{position:'relative',background:showNotif?C.border:C.card,border:`1px solid ${C.border}`,color:C.sub,padding:'7px 10px',borderRadius:8,cursor:'pointer',fontSize:16,transition:'all .2s'}}
              className={unread>0?'bell-shake':''}>
              🔔
              {unread>0&&<span className="badge-pop" style={{position:'absolute',top:-4,right:-4,width:16,height:16,borderRadius:'50%',background:C.red,color:'#fff',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{unread}</span>}
            </button>
            <div style={{width:34,height:34,background:`${C.accent}18`,border:`1px solid ${C.accent}44`,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:C.accent,fontWeight:700}}>CA</div>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:'auto',padding:20}}>
          {renderContent()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CAOfficePro/>);
</script>
</body>
</html>
